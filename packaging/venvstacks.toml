# oMLX venvstacks layer template
#
# Layer structure + runtime pin + uv resolver settings live here. The
# actual `requirements = [...]` for the mlx-base layer is generated
# at build time by packaging/build.py:_generate_venvstacks_toml() from
# pyproject.toml's [project] dependencies + [bundle] optional extra, so
# this file does not list package versions. Single source of truth for
# Python deps is pyproject.toml.
#
# No [[applications]] block: the Swift app is the application surface,
# so the venvstacks export only ships a runtime + framework layer.

[[runtimes]]
name = "cpython-3.11"
python_implementation = "cpython@3.11.10"
requirements = []
platforms = [
    "macosx_arm64",
]

[[frameworks]]
name = "mlx-base"
runtime = "cpython-3.11"
# Populated by _generate_venvstacks_toml() — do not hand-edit.
requirements = []
platforms = [
    "macosx_arm64",
]
# Exclude cv2's duplicate dylibs (same libs already provided by Pillow/PIL)
dynlib_exclude = [
    "cv2/.dylibs/libavif*",
    "cv2/.dylibs/liblcms2*",
    "cv2/.dylibs/libpng16*",
    "cv2/.dylibs/libtiff*",
    "cv2/.dylibs/libfreetype*",
    "cv2/.dylibs/libharfbuzz*",
    "cv2/.dylibs/liblzma*",
    "cv2/.dylibs/libxcb*",
    "cv2/.dylibs/libXau*",
]

[tool.uv]
exclude-newer = "2026-04-23T00:00:00Z"
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
]
